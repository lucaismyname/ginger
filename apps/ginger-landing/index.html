<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var k = "ginger-landing-theme";
        try {
          var t = localStorage.getItem(k);
          var dark =
            t === "dark" ||
            (t !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ginger — a headless React audio player. Install via npm."
    />
    <link rel="canonical" href="__SITE_URL__" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ginger" />
    <meta property="og:title" content="Ginger — headless React audio player" />
    <meta
      property="og:description"
      content="Build custom audio UIs with composable React primitives powered by the native audio element."
    />

</html>
