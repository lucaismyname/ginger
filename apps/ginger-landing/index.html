<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var k = "ginger-landing-theme";
        try {
          var t = localStorage.getItem(k);
          var dark =
            t === "dark" ||
            (t !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ginger — a headless React audio player. Install via npm."
    />
    <title>Ginger — headless React audio player</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
