name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Test library
        run: npm run test

      - name: Typecheck library
        run: npm run typecheck

      - name: Typecheck apps
        run: npm run typecheck:apps

      - name: Lint library
        run: npm run lint

      - name: Generate API docs
        run: npm run docs:api

      - name: Build demo app
        run: npm run build -w ginger-demo

      - name: Build landing app
        run: npm run build -w ginger-landing
